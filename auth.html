<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #888;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            border: none;
            background: none;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .auth-content {
            display: none;
        }

        .auth-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-form input {
            padding: 12px 15px;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-form input::placeholder {
            color: #ccc;
        }

        .auth-form button {
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .auth-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .auth-form button:active {
            transform: translateY(0);
        }

        .auth-message {
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .auth-message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .auth-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .auth-note {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: 20px;
        }

        .auth-note a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-note a:hover {
            text-decoration: underline;
        }

        .signup-extra {
            display: none;
        }

        .signup-extra.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Fitness Tracker</h1>
                <p>Real-time pose detection workout</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div id="login-content" class="auth-content active">
                <form class="auth-form" id="login-form">
                    <input type="email" id="login-email" placeholder="Email address" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <div id="login-message" class="auth-message"></div>
                <div class="auth-note">
                    Don't have an account? <a onclick="switchTab('signup')">Sign up here</a>
                </div>
            </div>

            <div id="signup-content" class="auth-content">
                <form class="auth-form" id="signup-form">
                    <input type="text" id="signup-firstname" placeholder="First name" required>
                    <input type="text" id="signup-lastname" placeholder="Last name" required>
                    <input type="email" id="signup-email" placeholder="Email address" required>
                    <input type="password" id="signup-password" placeholder="Password (min. 6 chars)" required>
                    <input type="password" id="signup-confirm" placeholder="Confirm password" required>
                    <button type="submit">Create Account</button>
                </form>
                <div id="signup-message" class="auth-message"></div>
                <div class="auth-note">
                    Already have an account? <a onclick="switchTab('login')">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
